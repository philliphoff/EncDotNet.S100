<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <!-- Chart background (water) -->
  <rect width="200" height="200" rx="16" fill="#D6E8F5" stroke="#8B7D6B" stroke-width="2"/>

  <!-- Main crescent island -->
  <path d="M50,30 Q60,24 75,22 Q95,18 115,24 Q135,30 150,44
           Q164,58 172,78 Q178,98 174,118 Q170,136 158,150
           Q146,162 130,168 Q115,172 100,170
           Q92,168 86,162 Q80,156 78,146
           Q82,138 90,132 Q100,126 112,126
           Q126,126 136,118 Q146,108 148,92
           Q150,76 142,62 Q134,50 120,42
           Q106,36 90,38 Q76,40 64,48
           Q54,56 48,68 Q44,78 44,90
           Q44,98 48,106 Q42,108 36,104
           Q28,96 26,84 Q24,68 30,52
           Q36,36 50,30 Z"
        fill="#F5F0E8" stroke="#2C1810" stroke-width="2.5" stroke-linejoin="round"/>

  <!-- Drying area along inner crescent shore -->
  <path d="M86,162 Q80,156 78,146 Q82,138 90,132 L94,136
           Q88,142 86,150 Q86,156 88,160 Z"
        fill="#C8D9A0" fill-opacity="0.6" stroke="#2C1810" stroke-width="0.6" stroke-dasharray="1,2"/>
  <!-- Drying area along southern tip -->
  <path d="M100,170 Q108,172 118,170 L120,176 Q108,180 98,178 Z"
        fill="#C8D9A0" fill-opacity="0.6" stroke="#2C1810" stroke-width="0.6" stroke-dasharray="1,2"/>
  <!-- Drying area along outer west shore -->
  <path d="M26,84 Q24,72 28,60 L22,58 Q18,72 20,86 Z"
        fill="#C8D9A0" fill-opacity="0.6" stroke="#2C1810" stroke-width="0.6" stroke-dasharray="1,2"/>

  <!-- Main island contour lines -->
  <path d="M56,36 Q72,28 95,26 Q120,28 140,42 Q158,58 164,80
           Q168,102 160,122 Q150,140 134,152 Q120,160 106,158
           Q96,156 90,148 Q88,140 94,134 Q104,128 118,130
           Q134,130 144,118 Q152,104 152,86 Q150,68 138,54
           Q124,42 106,38 Q86,36 70,44 Q58,52 52,66
           Q48,78 50,92 Q44,88 40,78 Q36,64 42,48 Z"
        fill="none" stroke="#8B7D6B" stroke-width="0.8" opacity="0.45"/>

  <!-- Small islet in the crescent bay -->
  <path d="M72,108 Q78,100 88,98 Q98,96 106,100 Q112,106 110,114
           Q106,122 96,124 Q86,124 78,118 Q72,114 72,108 Z"
        fill="#F5F0E8" stroke="#2C1810" stroke-width="2" stroke-linejoin="round"/>
  <!-- Islet contour -->
  <path d="M80,106 Q86,102 94,102 Q102,104 104,110
           Q102,116 96,118 Q88,118 82,114 Q78,110 80,106 Z"
        fill="none" stroke="#8B7D6B" stroke-width="0.6" opacity="0.4"/>

  <!-- Depth contours (dashed) -->
  <path d="M40,20 Q65,8 100,8 Q140,10 168,32 Q190,56 194,90
           Q196,124 182,152 Q164,176 138,186 Q110,192 84,184
           Q60,176 44,156 Q28,134 22,108 Q18,80 24,54 Q30,32 40,20 Z"
        fill="none" stroke="#4682B4" stroke-width="0.8" stroke-dasharray="6,3" opacity="0.55"/>

  <!-- Soundings -->
  <text x="14" y="48" font-family="serif" font-size="10" fill="#1a3a5c" text-anchor="middle">5</text>
  <text x="10" y="130" font-family="serif" font-size="10" fill="#1a3a5c" text-anchor="middle">9</text>
  <text x="185" y="60" font-family="serif" font-size="10" fill="#1a3a5c" text-anchor="middle">4</text>
  <text x="190" y="130" font-family="serif" font-size="10" fill="#1a3a5c" text-anchor="middle">7</text>
  <text x="90" y="115" font-family="serif" font-size="9" fill="#1a3a5c" text-anchor="middle">2</text>
  <text x="130" y="100" font-family="serif" font-size="10" fill="#1a3a5c" text-anchor="middle">3</text>
  <text x="58" y="185" font-family="serif" font-size="10" fill="#1a3a5c" text-anchor="middle">12</text>
  <text x="140" y="185" font-family="serif" font-size="10" fill="#1a3a5c" text-anchor="middle">11</text>
  <text x="30" y="185" font-family="serif" font-size="10" fill="#1a3a5c" text-anchor="middle">16</text>
  <text x="170" y="185" font-family="serif" font-size="10" fill="#1a3a5c" text-anchor="middle">14</text>
  <text x="100" y="14" font-family="serif" font-size="10" fill="#1a3a5c" text-anchor="middle">6</text>
  <text x="170" y="16" font-family="serif" font-size="10" fill="#1a3a5c" text-anchor="middle">8</text>

  <!-- Chart border neatline -->
  <rect x="6" y="6" width="188" height="188" rx="12" fill="none" stroke="#8B7D6B" stroke-width="0.5" stroke-dasharray="2,2" opacity="0.4"/>
</svg>
