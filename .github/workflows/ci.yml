name: CI

on:
  push:
    branches: [ main ]
    tags: [ 'v*' ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: |
            8.0.x
            10.0.x

      - name: Restore
        run: dotnet restore

      - name: Build
        run: dotnet build --no-restore --configuration Release

      - name: Test
        run: dotnet test --no-build --configuration Release --logger trx --results-directory TestResults

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: TestResults/*.trx

      - name: Upload visual regression diffs
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: rendering-snapshots
          path: |
            tests/EncDotNet.S100.VisualRegression.Tests/Snapshots/**/*.received.png
            tests/EncDotNet.S100.VisualRegression.Tests/Snapshots/**/*.diff.png
          if-no-files-found: ignore

      - name: Pack NuGet packages
        run: |
          dotnet pack src/EncDotNet.S100.Core/EncDotNet.S100.Core.csproj --no-build --configuration Release --output nupkgs
          dotnet pack src/EncDotNet.S100.Datasets.S101/EncDotNet.S100.Datasets.S101.csproj --no-build --configuration Release --output nupkgs
          dotnet pack src/EncDotNet.S100.Datasets.S102/EncDotNet.S100.Datasets.S102.csproj --no-build --configuration Release --output nupkgs
          dotnet pack src/EncDotNet.S100.Datasets.S111/EncDotNet.S100.Datasets.S111.csproj --no-build --configuration Release --output nupkgs
          dotnet pack src/EncDotNet.S100.ExchangeSets/EncDotNet.S100.ExchangeSets.csproj --no-build --configuration Release --output nupkgs
          dotnet pack src/EncDotNet.S100.Features/EncDotNet.S100.Features.csproj --no-build --configuration Release --output nupkgs
          dotnet pack src/EncDotNet.S100.Hdf5.PureHdf/EncDotNet.S100.Hdf5.PureHdf.csproj --no-build --configuration Release --output nupkgs
          dotnet pack src/EncDotNet.S100.Portrayals/EncDotNet.S100.Portrayals.csproj --no-build --configuration Release --output nupkgs
          dotnet pack src/EncDotNet.S100.Renderers.Mapsui/EncDotNet.S100.Renderers.Mapsui.csproj --no-build --configuration Release --output nupkgs
          dotnet pack src/EncDotNet.S100.Renderers.Skia/EncDotNet.S100.Renderers.Skia.csproj --no-build --configuration Release --output nupkgs
          dotnet pack src/EncDotNet.S100.Scripting.MoonSharp/EncDotNet.S100.Scripting.MoonSharp.csproj --no-build --configuration Release --output nupkgs

      - name: Upload NuGet packages
        uses: actions/upload-artifact@v4
        with:
          name: nupkgs
          path: nupkgs/*.nupkg

  test-arm64:
    strategy:
      matrix:
        include:
          - os: windows-11-arm
            name: win-arm64
    runs-on: ${{ matrix.os }}
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: |
            8.0.x
            10.0.x

      - name: Restore
        run: dotnet restore

      - name: Build
        run: dotnet build --no-restore --configuration Release

      - name: Test
        run: dotnet test --no-build --configuration Release --logger trx --results-directory TestResults

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-${{ matrix.name }}
          path: TestResults/*.trx

  publish:
    needs: build
    strategy:
      matrix:
        include:
          - os: macos-latest
            rid: osx-arm64
            artifact: Viewer-osx-arm64
          - os: windows-latest
            rid: win-x64
            artifact: Viewer-win-x64
          - os: windows-11-arm
            rid: win-arm64
            artifact: Viewer-win-arm64
          - os: ubuntu-latest
            rid: linux-x64
            artifact: Viewer-linux-x64
          - os: ubuntu-22.04-arm
            rid: linux-arm64
            artifact: Viewer-linux-arm64
    runs-on: ${{ matrix.os }}
    permissions:
      contents: read
    env:
      HAS_SIGNING_SECRETS: ${{ secrets.APPLE_DEVELOPER_CERTIFICATE_P12 != '' }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Publish Viewer
        run: >
          dotnet publish src/EncDotNet.S100.Viewer/EncDotNet.S100.Viewer.csproj
          --configuration Release
          --runtime ${{ matrix.rid }}
          ${{ matrix.rid == 'osx-arm64' && '-p:PublishSingleFile=false' || '' }}

      - name: Create macOS .app bundle
        if: matrix.rid == 'osx-arm64'
        run: |
          PUBLISH_DIR="src/EncDotNet.S100.Viewer/bin/Release/net10.0/osx-arm64/publish"
          APP="EncDotNet.S100.Viewer.app"
          mkdir -p "$APP/Contents/MacOS" "$APP/Contents/Resources"
          cp src/EncDotNet.S100.Viewer/Info.plist "$APP/Contents/"
          # AppIcon.icns is referenced from Info.plist via CFBundleIconFile.
          cp src/EncDotNet.S100.Viewer/Branding/AppIcon.icns "$APP/Contents/Resources/"
          cp -a "$PUBLISH_DIR"/. "$APP/Contents/MacOS/"
          # Remove debug symbols; they are not needed in the release bundle
          # and codesign treats them as unsigned code objects.
          find "$APP" -name '*.pdb' -delete

      - name: Import signing certificate
        if: matrix.rid == 'osx-arm64' && env.HAS_SIGNING_SECRETS == 'true'
        env:
          P12_BASE64: ${{ secrets.APPLE_DEVELOPER_CERTIFICATE_P12 }}
          P12_PASSWORD: ${{ secrets.APPLE_DEVELOPER_CERTIFICATE_PASSWORD }}
        run: |
          echo "$P12_BASE64" | base64 --decode > cert.p12
          security create-keychain -p "" build.keychain
          security default-keychain -s build.keychain
          security unlock-keychain -p "" build.keychain
          security import cert.p12 -k build.keychain -P "$P12_PASSWORD" -T /usr/bin/codesign
          security set-key-partition-list -S apple-tool:,apple: -s -k "" build.keychain

      - name: Sign macOS .app bundle
        if: matrix.rid == 'osx-arm64' && env.HAS_SIGNING_SECRETS == 'true'
        env:
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
        run: |
          APP="EncDotNet.S100.Viewer.app"
          ENTITLEMENTS="src/EncDotNet.S100.Viewer/entitlements.plist"
          MAIN_EXE="EncDotNet.S100.Viewer"
          # Sign all subcomponents individually before sealing the bundle.
          # Exclude the main executable — it will be signed when we sign
          # the bundle itself, which also validates all subcomponents.
          find "$APP/Contents/MacOS" -type f ! -name "$MAIN_EXE" | while read -r f; do
            if file "$f" | grep -q "Mach-O"; then
              codesign --force --options runtime --timestamp \
                --entitlements "$ENTITLEMENTS" \
                --sign "$APPLE_SIGNING_IDENTITY" "$f"
            else
              codesign --force --timestamp \
                --sign "$APPLE_SIGNING_IDENTITY" "$f"
            fi
          done
          # Sign the bundle (signs main executable and seals everything)
          codesign --force --options runtime --timestamp \
            --entitlements "$ENTITLEMENTS" \
            --sign "$APPLE_SIGNING_IDENTITY" \
            "$APP"

      - name: Notarize macOS .app bundle
        if: matrix.rid == 'osx-arm64' && env.HAS_SIGNING_SECRETS == 'true'
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          APPLE_APP_PASSWORD: ${{ secrets.APPLE_APP_PASSWORD }}
        run: |
          ditto -c -k --keepParent \
            EncDotNet.S100.Viewer.app \
            Viewer.zip
          xcrun notarytool submit Viewer.zip \
            --apple-id "$APPLE_ID" \
            --team-id "$APPLE_TEAM_ID" \
            --password "$APPLE_APP_PASSWORD" \
            --wait \
            --output-format json | tee notarization-result.json
          STATUS=$(python3 -c "import json,sys; print(json.load(sys.stdin)['status'])" < notarization-result.json)
          ID=$(python3 -c "import json,sys; print(json.load(sys.stdin)['id'])" < notarization-result.json)
          if [ "$STATUS" != "Accepted" ]; then
            echo "::error::Notarization failed with status: $STATUS"
            xcrun notarytool log "$ID" \
              --apple-id "$APPLE_ID" \
              --team-id "$APPLE_TEAM_ID" \
              --password "$APPLE_APP_PASSWORD"
            exit 1
          fi

      - name: Staple notarization ticket
        if: matrix.rid == 'osx-arm64' && env.HAS_SIGNING_SECRETS == 'true'
        continue-on-error: true
        run: |
          # The notarization ticket may not be immediately available in
          # CloudKit. Stapling is optional — Gatekeeper will verify the
          # notarization online on first launch if the ticket is absent.
          for i in 1 2 3 4 5; do
            if xcrun stapler staple EncDotNet.S100.Viewer.app; then
              exit 0
            fi
            echo "Staple attempt $i failed, waiting 30s..."
            sleep 30
          done
          echo "::warning::Stapling failed after 5 attempts. The app is still notarized; Gatekeeper will verify online."
          exit 1

      - name: Read viewer version
        if: matrix.rid == 'osx-arm64'
        id: viewer_version
        run: |
          VERSION=$(grep -oE '<Version>[^<]+' src/Directory.Build.props | sed 's/<Version>//')
          if [ -z "$VERSION" ]; then
            echo "::error::Could not read <Version> from src/Directory.Build.props"
            exit 1
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Build macOS DMG
        if: matrix.rid == 'osx-arm64'
        env:
          VERSION: ${{ steps.viewer_version.outputs.version }}
        run: |
          # Build a styled DMG with the branding background image, icon
          # positions and a hidden .background folder. Done in two passes:
          #   1) hdiutil create -format UDRW (read/write sparse image)
          #   2) mount, stage assets, run AppleScript to set window
          #      geometry + background + icon positions
          #   3) hdiutil convert -format UDZO (final compressed image)
          DMG_NAME="EncDotNet.S100.Viewer-${VERSION}.dmg"
          RW_DMG="$(mktemp -d)/rw.dmg"
          STAGING="$(mktemp -d)/dmg"
          BG="src/EncDotNet.S100.Viewer/Branding/dmg-background.png"
          VOLNAME="S-100 Viewer"

          mkdir -p "$STAGING/.background"
          cp "$BG" "$STAGING/.background/background.png"
          cp -R EncDotNet.S100.Viewer.app "$STAGING/"
          ln -s /Applications "$STAGING/Applications"

          hdiutil create \
            -volname "$VOLNAME" \
            -srcfolder "$STAGING" \
            -ov -format UDRW \
            "$RW_DMG"

          MOUNT_DIR="$(mktemp -d)/mnt"
          hdiutil attach "$RW_DMG" -readwrite -noverify -noautoopen -mountpoint "$MOUNT_DIR"

          # AppleScript geometry must match the SVG layout in
          # src/EncDotNet.S100.Viewer/Branding/dmg-background.svg.
          osascript \
            -e 'on run argv' \
            -e '  set volName to item 1 of argv' \
            -e '  tell application "Finder"' \
            -e '    tell disk volName' \
            -e '      open' \
            -e '      set current view of container window to icon view' \
            -e '      set toolbar visible of container window to false' \
            -e '      set statusbar visible of container window to false' \
            -e '      set the bounds of container window to {200, 120, 740, 500}' \
            -e '      set viewOptions to the icon view options of container window' \
            -e '      set arrangement of viewOptions to not arranged' \
            -e '      set icon size of viewOptions to 96' \
            -e '      set background picture of viewOptions to file ".background:background.png"' \
            -e '      set position of item "EncDotNet.S100.Viewer.app" of container window to {140, 200}' \
            -e '      set position of item "Applications" of container window to {400, 200}' \
            -e '      update without registering applications' \
            -e '      delay 1' \
            -e '      close' \
            -e '    end tell' \
            -e '  end tell' \
            -e 'end run' \
            "$VOLNAME"

          sync
          hdiutil detach "$MOUNT_DIR"
          hdiutil convert "$RW_DMG" -format UDZO -imagekey zlib-level=9 -ov -o "$DMG_NAME"
          echo "DMG_NAME=$DMG_NAME" >> "$GITHUB_ENV"

      - name: Sign macOS DMG
        if: matrix.rid == 'osx-arm64' && env.HAS_SIGNING_SECRETS == 'true'
        env:
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
        run: |
          codesign --force --sign "$APPLE_SIGNING_IDENTITY" --timestamp "$DMG_NAME"

      - name: Notarize macOS DMG
        if: matrix.rid == 'osx-arm64' && env.HAS_SIGNING_SECRETS == 'true'
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          APPLE_APP_PASSWORD: ${{ secrets.APPLE_APP_PASSWORD }}
        run: |
          xcrun notarytool submit "$DMG_NAME" \
            --apple-id "$APPLE_ID" \
            --team-id "$APPLE_TEAM_ID" \
            --password "$APPLE_APP_PASSWORD" \
            --wait \
            --output-format json | tee dmg-notarization-result.json
          STATUS=$(python3 -c "import json,sys; print(json.load(sys.stdin)['status'])" < dmg-notarization-result.json)
          ID=$(python3 -c "import json,sys; print(json.load(sys.stdin)['id'])" < dmg-notarization-result.json)
          if [ "$STATUS" != "Accepted" ]; then
            echo "::error::DMG notarization failed with status: $STATUS"
            xcrun notarytool log "$ID" \
              --apple-id "$APPLE_ID" \
              --team-id "$APPLE_TEAM_ID" \
              --password "$APPLE_APP_PASSWORD"
            exit 1
          fi

      - name: Staple notarization ticket to DMG
        if: matrix.rid == 'osx-arm64' && env.HAS_SIGNING_SECRETS == 'true'
        continue-on-error: true
        run: |
          # Same retry shape as the .app stapler step: the notarization
          # ticket may not yet be available in CloudKit. The DMG is
          # still notarized — Gatekeeper will verify online if the
          # ticket is absent.
          for i in 1 2 3 4 5; do
            if xcrun stapler staple "$DMG_NAME"; then
              exit 0
            fi
            echo "DMG staple attempt $i failed, waiting 30s..."
            sleep 30
          done
          echo "::warning::DMG stapling failed after 5 attempts. The DMG is still notarized; Gatekeeper will verify online."
          exit 1

      - name: Archive macOS .app bundle
        if: matrix.rid == 'osx-arm64'
        run: tar -czf "${{ matrix.artifact }}.tar.gz" EncDotNet.S100.Viewer.app

      - name: Archive published app
        if: matrix.rid != 'osx-arm64'
        shell: bash
        run: tar -czf "${{ matrix.artifact }}.tar.gz" -C "src/EncDotNet.S100.Viewer/bin/Release/net10.0/${{ matrix.rid }}/publish" .

      - name: Upload published app
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.artifact }}.tar.gz

      - name: Upload macOS DMG
        if: matrix.rid == 'osx-arm64'
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}-dmg
          path: ${{ env.DMG_NAME }}

  publish-nuget:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: build
    runs-on: ubuntu-latest
    permissions:
      id-token: write

    steps:
      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Download NuGet packages
        uses: actions/download-artifact@v4
        with:
          name: nupkgs
          path: nupkgs

      - name: NuGet login
        uses: NuGet/login@v1
        id: login
        with:
          user: ${{ secrets.NUGET_USER }}

      - name: Push to NuGet.org
        run: dotnet nuget push "nupkgs/*.nupkg" --api-key ${{steps.login.outputs.NUGET_API_KEY}} --source https://api.nuget.org/v3/index.json

  create-release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [build, publish]
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            artifacts/nupkgs/*.nupkg
            artifacts/Viewer-*/*.tar.gz
            artifacts/Viewer-*-dmg/*.dmg
