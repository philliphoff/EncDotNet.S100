name: CI

on:
  push:
    branches: [ main ]
    tags: [ 'v*' ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore
        run: dotnet restore

      - name: Build
        run: dotnet build --no-restore --configuration Release

      - name: Test
        run: dotnet test --no-build --configuration Release --logger trx --results-directory TestResults

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: TestResults/*.trx

      - name: Pack NuGet packages
        run: |
          dotnet pack src/EncDotNet.S100.Core/EncDotNet.S100.Core.csproj --no-build --configuration Release --output nupkgs
          dotnet pack src/EncDotNet.S100.Datasets.S101/EncDotNet.S100.Datasets.S101.csproj --no-build --configuration Release --output nupkgs
          dotnet pack src/EncDotNet.S100.Datasets.S102/EncDotNet.S100.Datasets.S102.csproj --no-build --configuration Release --output nupkgs
          dotnet pack src/EncDotNet.S100.Datasets.S111/EncDotNet.S100.Datasets.S111.csproj --no-build --configuration Release --output nupkgs
          dotnet pack src/EncDotNet.S100.ExchangeSets/EncDotNet.S100.ExchangeSets.csproj --no-build --configuration Release --output nupkgs
          dotnet pack src/EncDotNet.S100.Features/EncDotNet.S100.Features.csproj --no-build --configuration Release --output nupkgs
          dotnet pack src/EncDotNet.S100.Hdf5.PureHdf/EncDotNet.S100.Hdf5.PureHdf.csproj --no-build --configuration Release --output nupkgs
          dotnet pack src/EncDotNet.S100.Portrayals/EncDotNet.S100.Portrayals.csproj --no-build --configuration Release --output nupkgs
          dotnet pack src/EncDotNet.S100.Renderers.Mapsui/EncDotNet.S100.Renderers.Mapsui.csproj --no-build --configuration Release --output nupkgs
          dotnet pack src/EncDotNet.S100.Renderers.Skia/EncDotNet.S100.Renderers.Skia.csproj --no-build --configuration Release --output nupkgs
          dotnet pack src/EncDotNet.S100.Scripting.MoonSharp/EncDotNet.S100.Scripting.MoonSharp.csproj --no-build --configuration Release --output nupkgs

      - name: Upload NuGet packages
        uses: actions/upload-artifact@v4
        with:
          name: nupkgs
          path: nupkgs/*.nupkg

  publish:
    needs: build
    strategy:
      matrix:
        include:
          - os: macos-latest
            rid: osx-arm64
            artifact: Viewer-osx-arm64
          - os: windows-latest
            rid: win-x64
            artifact: Viewer-win-x64
          - os: ubuntu-latest
            rid: linux-x64
            artifact: Viewer-linux-x64
    runs-on: ${{ matrix.os }}
    permissions:
      contents: read
    env:
      HAS_SIGNING_SECRETS: ${{ secrets.APPLE_DEVELOPER_CERTIFICATE_P12 != '' }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Publish Viewer
        run: >
          dotnet publish src/EncDotNet.S100.Viewer/EncDotNet.S100.Viewer.csproj
          --configuration Release
          --runtime ${{ matrix.rid }}
          ${{ matrix.rid == 'osx-arm64' && '-p:PublishSingleFile=false' || '' }}

      - name: Create macOS .app bundle
        if: matrix.rid == 'osx-arm64'
        run: |
          PUBLISH_DIR="src/EncDotNet.S100.Viewer/bin/Release/net10.0/osx-arm64/publish"
          APP="EncDotNet.S100.Viewer.app"
          mkdir -p "$APP/Contents/MacOS" "$APP/Contents/Resources"
          cp src/EncDotNet.S100.Viewer/Info.plist "$APP/Contents/"
          cp -a "$PUBLISH_DIR"/. "$APP/Contents/MacOS/"

      - name: Import signing certificate
        if: matrix.rid == 'osx-arm64' && env.HAS_SIGNING_SECRETS == 'true'
        env:
          P12_BASE64: ${{ secrets.APPLE_DEVELOPER_CERTIFICATE_P12 }}
          P12_PASSWORD: ${{ secrets.APPLE_DEVELOPER_CERTIFICATE_PASSWORD }}
        run: |
          echo "$P12_BASE64" | base64 --decode > cert.p12
          security create-keychain -p "" build.keychain
          security default-keychain -s build.keychain
          security unlock-keychain -p "" build.keychain
          security import cert.p12 -k build.keychain -P "$P12_PASSWORD" -T /usr/bin/codesign
          security set-key-partition-list -S apple-tool:,apple: -s -k "" build.keychain

      - name: Sign macOS .app bundle
        if: matrix.rid == 'osx-arm64' && env.HAS_SIGNING_SECRETS == 'true'
        env:
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
        run: |
          APP="EncDotNet.S100.Viewer.app"
          ENTITLEMENTS="src/EncDotNet.S100.Viewer/entitlements.plist"
          find "$APP" -name '*.dylib' -exec \
            codesign --force --options runtime --timestamp \
            --entitlements "$ENTITLEMENTS" \
            --sign "$APPLE_SIGNING_IDENTITY" {} \;
          codesign --force --options runtime --timestamp \
            --entitlements "$ENTITLEMENTS" \
            --sign "$APPLE_SIGNING_IDENTITY" \
            "$APP"

      - name: Notarize macOS .app bundle
        if: matrix.rid == 'osx-arm64' && env.HAS_SIGNING_SECRETS == 'true'
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          APPLE_APP_PASSWORD: ${{ secrets.APPLE_APP_PASSWORD }}
        run: |
          ditto -c -k --keepParent \
            EncDotNet.S100.Viewer.app \
            Viewer.zip
          xcrun notarytool submit Viewer.zip \
            --apple-id "$APPLE_ID" \
            --team-id "$APPLE_TEAM_ID" \
            --password "$APPLE_APP_PASSWORD" \
            --wait

      - name: Staple notarization ticket
        if: matrix.rid == 'osx-arm64' && env.HAS_SIGNING_SECRETS == 'true'
        run: xcrun stapler staple EncDotNet.S100.Viewer.app

      - name: Archive published app
        run: |
          if [ "${{ matrix.rid }}" = "osx-arm64" ]; then
            tar -czf "${{ matrix.artifact }}.tar.gz" EncDotNet.S100.Viewer.app
          else
            PUBLISH_DIR="src/EncDotNet.S100.Viewer/bin/Release/net10.0/${{ matrix.rid }}/publish"
            tar -czf "${{ matrix.artifact }}.tar.gz" -C "$PUBLISH_DIR" .
          fi

      - name: Upload published app
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.artifact }}.tar.gz

  publish-nuget:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: build
    runs-on: ubuntu-latest
    permissions:
      id-token: write

    steps:
      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Download NuGet packages
        uses: actions/download-artifact@v4
        with:
          name: nupkgs
          path: nupkgs

      - name: NuGet login
        uses: NuGet/login@v1
        id: login
        with:
          user: ${{ secrets.NUGET_USER }}

      - name: Push to NuGet.org
        run: dotnet nuget push "nupkgs/*.nupkg" --api-key ${{steps.login.outputs.NUGET_API_KEY}} --source https://api.nuget.org/v3/index.json

  create-release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [build, publish]
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            artifacts/nupkgs/*.nupkg
            artifacts/Viewer-*/*.tar.gz
